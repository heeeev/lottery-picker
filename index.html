<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>추첨기</title>
<meta name="description" content="명단을 붙여넣고 원하는 인원만큼 뽑는 추첨기.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css">
<style>
  :root{
    --bg:#F7F6F3;
    --surface:#FFFFFF;
    --ink:#16150F;
    --sub:#8B887E;
    --line:#E4E1DA;
    --line-2:#D4D0C7;
    --fill:#F2CE5E;
    --on-fill:#16150F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Galmuri11',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    min-height:100vh;line-height:1.6;
    padding:clamp(20px,5vw,72px) clamp(18px,5vw,40px);
    -webkit-font-smoothing:antialiased;
  }
  .shell{max-width:980px;margin:0 auto}

  .head{margin-bottom:clamp(28px,5vw,52px);border-bottom:1px solid var(--line);padding-bottom:clamp(20px,3vw,30px)}
  h1{font-family:'Galmuri14';font-size:clamp(20px,3.4vw,30px);font-weight:400;line-height:1.35;letter-spacing:-.01em}
  .tagline{color:var(--sub);font-size:13px;margin-top:12px;letter-spacing:.01em}
  .head-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap}
  .swatches{display:flex;gap:8px;flex-shrink:0;padding-top:4px}
  .sw{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);cursor:pointer;padding:0;transition:transform .12s,border-color .12s}
  .sw:hover{transform:scale(1.14)}
  .sw.active{border-color:var(--ink)}

  .grid{display:grid;grid-template-columns:minmax(0,360px) minmax(0,1fr);gap:clamp(16px,3vw,28px);align-items:start}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:clamp(16px,2.4vw,22px)}

  .label-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
  .label-row .lab{font-size:13px;color:var(--sub);letter-spacing:.04em}
  .label-row .cnt{font-size:13px;color:var(--ink)}

  textarea{
    width:100%;min-height:240px;resize:vertical;
    font-family:'Galmuri11',sans-serif;font-size:14px;line-height:1.9;
    color:var(--ink);background:var(--surface);
    border:1px solid var(--line-2);border-radius:8px;padding:13px 14px;
    transition:border-color .14s;
  }
  textarea:focus{outline:none;border-color:var(--fill)}
  textarea::placeholder{color:var(--sub)}

  .opts{display:flex;gap:16px;flex-wrap:wrap;margin-top:13px}
  .opt{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--sub);cursor:pointer;user-select:none}
  .opt input{width:15px;height:15px;accent-color:var(--fill);cursor:pointer}

  .counter-row{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
  .field{flex:1;min-width:128px}
  .field label{display:block;font-size:12px;color:var(--sub);margin-bottom:7px;letter-spacing:.02em}
  .stepper{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:8px;overflow:hidden}
  .stepper button{width:40px;height:42px;border:none;background:var(--surface);color:var(--ink);font-family:'Galmuri11',sans-serif;font-size:16px;cursor:pointer;transition:background .12s;flex:none}
  .stepper button:hover{background:var(--bg)}
  .stepper input{flex:1;width:100%;border:none;background:transparent;text-align:center;font-family:'Galmuri11',sans-serif;font-size:15px;color:var(--ink);-moz-appearance:textfield}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .stepper input:focus{outline:none}

  .stage{display:flex;flex-direction:column}
  .stage-meta{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;color:var(--sub);letter-spacing:.02em}
  .stage-meta b{color:var(--ink);font-weight:400}

  .slots{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));margin-bottom:16px;min-height:120px}
  .slots.empty{grid-template-columns:1fr;place-items:center;min-height:150px;border:1px dashed var(--line-2);border-radius:10px;color:var(--sub);text-align:center;font-size:13px;padding:24px}
  .slot{position:relative;height:118px;background:var(--surface);border:1px solid var(--line-2);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:border-color .25s,background .25s,color .25s}
  .slot .tag{position:absolute;top:9px;left:12px;font-size:11px;color:var(--sub);z-index:2;transition:color .25s}
  .reel{display:flex;flex-direction:column;align-items:center;will-change:transform}
  .reel .cell{height:118px;width:100%;display:flex;align-items:center;justify-content:center;padding:0 12px;text-align:center;font-size:clamp(14px,1.7vw,17px);color:var(--ink);word-break:break-all}
  .slot.win{background:var(--fill);border-color:var(--fill);color:var(--on-fill)}
  .slot.win .tag{color:var(--on-fill);opacity:.55}
  .slot.win .cell{color:var(--on-fill)}

  .reserves{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
  .res-chip{border:1px solid var(--line-2);border-radius:6px;padding:6px 11px;font-size:12px;color:var(--ink)}
  .res-chip .rn{color:var(--sub);margin-right:7px}

  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{font-family:'Galmuri11',sans-serif;font-size:14px;cursor:pointer;border-radius:8px;padding:14px 22px;border:1px solid transparent;transition:opacity .14s,background .14s,color .14s,border-color .14s}
  .btn-primary{background:var(--fill);color:var(--on-fill);flex:1;min-width:150px}
  .btn-primary:hover{opacity:.88}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--ink);border-color:var(--line-2)}
  .btn-ghost:hover{border-color:var(--fill);color:var(--fill)}

  .note{margin-top:22px;font-size:11.5px;color:var(--sub);line-height:1.8}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(14px);background:var(--ink);color:var(--bg);font-size:13px;padding:11px 20px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion:reduce){.reel{transition:none!important}.slot,.btn{transition:none}}
</style>
</head>
<body>
<div class="shell">
  <header class="head">
    <div class="head-top">
      <div>
        <h1>명단 붙여넣고 뽑기</h1>
        <p class="tagline">이름·아이디를 한 줄에 하나씩, 또는 쉼표로 구분해서 넣으세요.</p>
      </div>
      <div class="swatches" id="swatches">
        <button class="sw" type="button" data-f="#F2CE5E" style="background:#F2CE5E" aria-label="버터 옐로우"></button>
        <button class="sw" type="button" data-f="#F6A98A" style="background:#F6A98A" aria-label="피치"></button>
        <button class="sw" type="button" data-f="#F299B8" style="background:#F299B8" aria-label="로즈"></button>
        <button class="sw" type="button" data-f="#AD9EE3" style="background:#AD9EE3" aria-label="라벤더"></button>
        <button class="sw" type="button" data-f="#8FCDB0" style="background:#8FCDB0" aria-label="민트"></button>
        <button class="sw" type="button" data-f="#93C0E8" style="background:#93C0E8" aria-label="스카이"></button>
      </div>
    </div>
  </header>

  <div class="grid">
    <section class="panel">
      <div class="label-row"><span class="lab">명단</span><span class="cnt" id="count">0</span></div>
      <textarea id="list" placeholder="홍길동&#10;김영희&#10;@instagram_id&#10;...&#10;&#10;가, 나, 다"></textarea>
      <div class="opts">
        <label class="opt"><input type="checkbox" id="dedup" checked>중복 제거</label>
        <label class="opt"><input type="checkbox" id="strip" checked>@ 정리</label>
      </div>
      <div class="counter-row">
        <div class="field">
          <label for="winN">당첨 인원</label>
          <div class="stepper">
            <button type="button" data-t="winN" data-d="-1" aria-label="줄이기">−</button>
            <input id="winN" type="number" min="1" value="1" inputmode="numeric">
            <button type="button" data-t="winN" data-d="1" aria-label="늘리기">+</button>
          </div>
        </div>
        <div class="field">
          <label for="resN">예비 당첨</label>
          <div class="stepper">
            <button type="button" data-t="resN" data-d="-1" aria-label="줄이기">−</button>
            <input id="resN" type="number" min="0" value="0" inputmode="numeric">
            <button type="button" data-t="resN" data-d="1" aria-label="늘리기">+</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel stage">
      <div class="stage-meta">
        <span>참가 <b id="m-total">0</b></span>
        <span>당첨 <b id="m-win">1</b></span>
        <span>예비 <b id="m-res">0</b></span>
      </div>

      <div class="slots empty" id="slots">추첨을 시작하면 여기에 당첨자가 나옵니다.</div>
      <div class="reserves" id="reserves"></div>

      <div class="actions">
        <button class="btn btn-primary" id="draw">추첨 시작</button>
        <button class="btn btn-ghost" id="copy">당첨자 복사</button>
      </div>

      <p class="note">버튼을 누를 때마다 명단을 새로 섞어 뽑습니다. 같은 사람이 두 번 뽑히지 않으며, 명단은 이 브라우저에만 저장됩니다.</p>
    </section>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const $=s=>document.querySelector(s);
  const listEl=$('#list'),countEl=$('#count'),slotsEl=$('#slots'),reservesEl=$('#reserves');
  const winInput=$('#winN'),resInput=$('#resN');
  const drawBtn=$('#draw'),copyBtn=$('#copy');
  const mTotal=$('#m-total'),mWin=$('#m-win'),mRes=$('#m-res');
  const dedupEl=$('#dedup'),stripEl=$('#strip');
  const LS='picker.list.v1';
  let lastDraw={winners:[],reserves:[]},spinning=false;

  try{const saved=localStorage.getItem(LS);if(saved)listEl.value=saved;}catch(e){}

  function parseList(){
    let raw=listEl.value.split(/[\n,]+/).map(s=>s.trim());
    if(stripEl.checked)raw=raw.map(s=>s.replace(/^@+/,'').trim());
    raw=raw.filter(Boolean);
    if(dedupEl.checked){const seen=new Set(),out=[];for(const x of raw){const k=x.toLowerCase();if(!seen.has(k)){seen.add(k);out.push(x);}}raw=out;}
    return raw;
  }
  function clampInputs(total){
    let w=parseInt(winInput.value)||1;w=Math.max(1,Math.min(w,Math.max(1,total)));winInput.value=w;
    let r=parseInt(resInput.value)||0;r=Math.max(0,Math.min(r,Math.max(0,total-w)));resInput.value=r;
    return {w,r};
  }
  function refresh(){
    const list=parseList();
    countEl.textContent=list.length;
    mTotal.textContent=list.length;
    const {w,r}=clampInputs(list.length);
    mWin.textContent=w;mRes.textContent=r;
    try{localStorage.setItem(LS,listEl.value);}catch(e){}
  }
  function rand(){return crypto.getRandomValues(new Uint32Array(1))[0]/(0xFFFFFFFF+1);}
  function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function buildReel(slot,finalName,pool){
    const reel=document.createElement('div');reel.className='reel';
    const fill=Math.min(16,Math.max(8,pool.length));
    for(let i=0;i<fill;i++){
      const d=document.createElement('div');d.className='cell';
      d.textContent=pool[Math.floor(rand()*pool.length)]||finalName;
      reel.appendChild(d);
    }
    const f=document.createElement('div');f.className='cell';f.textContent=finalName;reel.appendChild(f);
    slot.appendChild(reel);
    return {reel,fill};
  }

  async function draw(){
    if(spinning)return;
    const list=parseList();
    if(list.length<1){toast('명단을 먼저 넣어주세요');return;}
    const {w,r}=clampInputs(list.length);
    spinning=true;drawBtn.disabled=true;drawBtn.textContent='추첨 중';

    const pool=shuffle(list);
    const winners=pool.slice(0,w),reserves=pool.slice(w,w+r);
    lastDraw={winners,reserves};

    slotsEl.className='slots';slotsEl.innerHTML='';reservesEl.innerHTML='';
    const items=[];
    winners.forEach((name,i)=>{
      const slot=document.createElement('div');slot.className='slot';
      slot.innerHTML='<span class="tag">'+String(i+1).padStart(2,'0')+'</span>';
      slotsEl.appendChild(slot);
      items.push({slot,name,...buildReel(slot,name,list)});
    });

    await new Promise(res=>setTimeout(res,60));
    const gap=w>8?0.12:w>4?0.22:0.42,base=1.25;let last=0;
    items.forEach((o,i)=>{
      const dur=base+i*gap;last=Math.max(last,dur);
      o.reel.getBoundingClientRect();
      o.reel.style.transition='transform '+dur+'s cubic-bezier(.1,.62,.2,1)';
      o.reel.style.transform='translateY('+(-(o.fill*118))+'px)';
      setTimeout(()=>{
        o.reel.style.transition='none';
        o.reel.style.transform='translateY(0)';
        o.reel.innerHTML='<div class="cell">'+esc(o.name)+'</div>';
        o.slot.classList.add('win');
      },dur*1000+30);
    });

    setTimeout(()=>{
      reserves.forEach((name,i)=>{
        const c=document.createElement('span');c.className='res-chip';
        c.innerHTML='<span class="rn">예비 '+(i+1)+'</span>'+esc(name);
        reservesEl.appendChild(c);
      });
      drawBtn.disabled=false;drawBtn.textContent='다시 추첨';spinning=false;
    },last*1000+200);
  }

  function copyWinners(){
    if(!lastDraw.winners.length){toast('먼저 추첨을 돌려주세요');return;}
    let text=lastDraw.winners.join('\n');
    if(lastDraw.reserves.length)text+='\n\n[예비]\n'+lastDraw.reserves.join('\n');
    navigator.clipboard.writeText(text).then(()=>toast('복사했어요')).catch(()=>toast('복사 실패'));
  }
  let tT;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),1700);}

  listEl.addEventListener('input',refresh);
  dedupEl.addEventListener('change',refresh);
  stripEl.addEventListener('change',refresh);
  winInput.addEventListener('input',refresh);
  resInput.addEventListener('input',refresh);
  document.querySelectorAll('.stepper button').forEach(b=>{
    b.addEventListener('click',()=>{const el=$('#'+b.dataset.t);el.value=(parseInt(el.value)||0)+parseInt(b.dataset.d);refresh();});
  });
  drawBtn.addEventListener('click',draw);
  copyBtn.addEventListener('click',copyWinners);

  // 색 테마
  const THEME_LS='picker.theme.v1';
  const sws=[...document.querySelectorAll('.sw')];
  function applyTheme(f){
    document.documentElement.style.setProperty('--fill',f);
    sws.forEach(s=>s.classList.toggle('active',s.dataset.f.toLowerCase()===f.toLowerCase()));
    try{localStorage.setItem(THEME_LS,f);}catch(e){}
  }
  sws.forEach(s=>s.addEventListener('click',()=>applyTheme(s.dataset.f)));
  let savedTheme;try{savedTheme=localStorage.getItem(THEME_LS);}catch(e){}
  applyTheme(savedTheme||sws[0].dataset.f);

  refresh();
})();
</script>
</body>
</html>
